[package]
name = "staking-app-cpi"
version = "0.1.0"
description = "CPI bindings for staking-app, generated from idl.json via anchor-gen"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "staking_app_cpi"

[features]
no-entrypoint = []
cpi = ["no-entrypoint"]
default = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.31.1"
anchor-gen = "0.4.1"
